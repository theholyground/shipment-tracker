<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Express Logistics - Shipment Tracking</title><style>body{font-family:Arial;background:#eef2f7;margin:0}.header{background:#0057b8;color:#fff;padding:20px;text-align:center}.container{max-width:900px;margin:30px auto;background:#fff;padding:30px;border-radius:10px}input{width:70%;padding:12px}button{padding:12px 20px;background:#0057b8;color:#fff;border:0}#result{margin-top:20px}.circle{width:20px;height:20px;border-radius:50%;background:#28a745;display:inline-block}.pending{background:#bbb}</style></head><body><div class='header'><h1>Express Logistics</h1><p>Shipment Tracking Portal</p></div><div class='container'><input id='tracking' placeholder='Enter Tracking Number'><button onclick='track()'>Track Shipment</button><div id='result'></div></div><script>const shipments={'PHL782946153NG':{status:'Package On Hold',carrier:'Express Logistics',origin:'Warsaw, Poland',destination:'R.M van Hemert<br>Julianalaan 6-b<br>3851 RC Ermelo<br>The Netherlands',estimated:'08 July 2026',history:['02 Jul 2026 - Shipment received in Warsaw, Poland','03 Jul 2026 - Cleared export customs','04 Jul 2026 - Departed Warsaw International Hub','05 Jul 2026 - Arrived Amsterdam Sorting Facility','06 Jul 2026 - Customs inspection initiated','07 Jul 2026 - Package On Hold – Awaiting customs clearance before final delivery to Ermelo, The Netherlands']}};function track(){let n=document.getElementById('tracking').value.trim(),r=document.getElementById('result');if(shipments[n]){let s=shipments[n];r.innerHTML='<h2>'+s.status+'</h2><p><b>Tracking Number:</b> '+n+'</p><p><b>Carrier:</b> '+s.carrier+'</p><p><b>Origin:</b> '+s.origin+'</p><p><b>Destination:</b><br>'+s.destination+'</p><p><b>Estimated Delivery:</b> '+s.estimated+'</p><h3>History</h3><ul>'+s.history.map(x=>'<li>'+x+'</li>').join('')+'</ul>';}else r.innerHTML='<p style="color:red">Tracking number not found.</p>';}</script></body></html>
